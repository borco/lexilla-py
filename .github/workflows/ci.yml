name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm disabled: `uv sync` pulls the dev-group
        # pyside6-scintilla dependency (needed to test/lint the examples),
        # which has no aarch64 wheel yet -- borco/pyside6-scintilla#4.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: uv sync
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run python tools/check_docs_sync.py
          uv run pyright
