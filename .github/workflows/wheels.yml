name: Wheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm is a native Arm64 runner (no QEMU) for the
        # manylinux_aarch64 wheel declared in pyproject.toml's
        # [tool.cibuildwheel] build string -- cibuildwheel only builds the
        # arch matching the host by default, so a dedicated Arm runner is
        # needed alongside ubuntu-latest's x86_64 build.
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
